# ==============================================================================
# DATASOURCE (H2 In-Memory Nativo v2)
# ==============================================================================
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:radiologydb;DB_CLOSE_DELAY=-1

# ==============================================================================
# HIBERNATE ORM / JPA
# ==============================================================================
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

# ==============================================================================
# CONFIGURAZIONE CORS (Integrazione Angular)
# ==============================================================================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,X-Requested-With

# ==============================================================================
# CONFIGURAZIONE NATIVA MICROPROFILE JWT (Verifica Locale Asimmetrica RS256)
# ==============================================================================
mmp.jwt.verify.issuer=http://localhost:8080
mp.jwt.verify.publickey.location=publicKey.pem

# ==============================================================================
# CONFIGURAZIONE AMBIENTE DI TEST
# ==============================================================================
%test.quarkus.http.test-port=8087